Listen 3000
ServerName localhost
ServerTokens Prod
ServerSignature Off
TraceEnable Off

Header always unset X-Powered-By
Header always set X-Content-Type-Options "nosniff"
Header always set Referrer-Policy "no-referrer"

<VirtualHost *:3000>
    DocumentRoot /app/public

    ErrorLog /tmp/random-image-api-error.log
    CustomLog /tmp/random-image-api-access.log combined

    <Directory /app/public>
        Options -Indexes
        AllowOverride None
        Require all granted
        DirectoryIndex index.php
        FallbackResource /index.php
    </Directory>

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    <FilesMatch "\.php$">
        SetHandler application/x-httpd-php
    </FilesMatch>
</VirtualHost>
